name: "warmup_benchmark_matrix"

server_config:
  model_path: "/data/models/Qwen3.5-9B/"
  tp: 8
  host: "0.0.0.0"
  port: 30001
  extra_args: "--trust-remote-code --disable-radix-cache --reasoning-parser qwen3 --tool-call-parser qwen3_coder --enable-flashinfer-allreduce-fusion --mem-fraction-static 0.8"

sets:
  - name: "Warmup_Light_IO"
    io_pairs:
      - [32, 32]
      - [256, 256]
    concurrency_and_prompts:
      - [1, 2]
      - [4, 8]
  - name: "Warmup_Decode_Only"
    io_pairs:
      - [1, 512]
    concurrency_and_prompts:
      - [1, 2]
      - [2, 4]
  - name: "Warmup_Prefill_Only"
    io_pairs:
      - [1024, 1]
    concurrency_and_prompts:
      - [1, 2]
      - [4, 8]
